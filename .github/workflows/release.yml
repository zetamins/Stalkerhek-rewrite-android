name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install API 35
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1
          yes | sdkmanager --licenses 2>&1 || true

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build debug APKs
        run: |
          echo "=== ENV ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la local.properties 2>/dev/null || true
          cat local.properties 2>/dev/null || true
          echo "=== SDK ==="
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || true
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || true
          echo "=== JAVA ==="
          java -version 2>&1 || true
          echo "=== BUILD ==="
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          echo "EXIT_CODE=${PIPESTATUS[0]}"
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "=== FAILURE LOG ==="
            tail -100 build.log
          fi

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          OUT="app/build/outputs/apk/debug"
          if [ -d "$OUT" ]; then
            for apk in "$OUT"/*.apk; do
              base=$(basename "$apk")
              if echo "$base" | grep -q "arm64-v8a"; then
                cp "$apk" "artifacts/Stalkerhek-TvPhone-arm64-v8a.apk"
              elif echo "$base" | grep -q "armeabi-v7a"; then
                cp "$apk" "artifacts/Stalkerhek-TvPhone-armeabi-v7a.apk"
              elif echo "$base" | grep -q "x86_64"; then
                cp "$apk" "artifacts/Stalkerhek-x86_64.apk"
              elif echo "$base" | grep -q "universal"; then
                cp "$apk" "artifacts/Stalkerhek-universal.apk"
              elif echo "$base" | grep -qv "split-"; then
                cp "$apk" "artifacts/Stalkerhek-universal.apk"
              fi
            done
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Stalkerhek-APKs
          path: artifacts/
          compression-level: 0

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          name: Stalkerhek ${{ github.ref_name }}
          body: |
            ## Stalkerhek Android App

            ### Downloads
            - **TV / Phone (arm64-v8a)** — For modern Android TV devices and phones
            - **TV / Phone (armeabi-v7a)** — For older Android TV devices and phones
            - **x86_64** — For x86 emulators and devices
            - **Universal** — Contains all architectures

            ### Installation
            Download the APK matching your device and install it.
