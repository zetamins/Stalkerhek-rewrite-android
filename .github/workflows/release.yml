name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: /opt/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache Android SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/android-sdk
          key: android-sdk-35-v1

      - name: Install Android SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/android-sdk
          curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/cmd.zip
          sudo unzip -q /tmp/cmd.zip -d /tmp/android-cmd
          sudo mkdir -p /opt/android-sdk/cmdline-tools/latest
          sudo mv /tmp/android-cmd/cmdline-tools/* /opt/android-sdk/cmdline-tools/latest/
          sudo chmod -R 777 /opt/android-sdk
          echo "Downloaded cmdline-tools:"
          ls -la /opt/android-sdk/cmdline-tools/latest/bin/

      - name: Install SDK packages
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 || true

      - name: Add SDK to PATH
        run: |
          echo "/opt/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "sdk.dir=/opt/android-sdk" > local.properties
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APKs
        run: |
          set -x
          cat local.properties
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          OUT="app/build/outputs/apk/debug"
          if [ -d "$OUT" ]; then
            for apk in "$OUT"/*.apk; do
              base=$(basename "$apk")
              if echo "$base" | grep -q "arm64-v8a"; then
                cp "$apk" "artifacts/Stalkerhek-TvPhone-arm64-v8a.apk"
              elif echo "$base" | grep -q "armeabi-v7a"; then
                cp "$apk" "artifacts/Stalkerhek-TvPhone-armeabi-v7a.apk"
              elif echo "$base" | grep -q "x86_64"; then
                cp "$apk" "artifacts/Stalkerhek-x86_64.apk"
              elif echo "$base" | grep -q "universal"; then
                cp "$apk" "artifacts/Stalkerhek-universal.apk"
              elif echo "$base" | grep -qv "split-"; then
                cp "$apk" "artifacts/Stalkerhek-universal.apk"
              fi
            done
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Stalkerhek-APKs
          path: artifacts/
          compression-level: 0

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          name: Stalkerhek ${{ github.ref_name }}
          body: |
            ## Stalkerhek Android App

            ### Downloads
            - **TV / Phone (arm64-v8a)** — For modern Android TV devices and phones
            - **TV / Phone (armeabi-v7a)** — For older Android TV devices and phones
            - **x86_64** — For x86 emulators and devices
            - **Universal** — Contains all architectures

            ### Installation
            Download the APK matching your device and install it.
