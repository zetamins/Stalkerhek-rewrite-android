name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APKs
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          OUT="app/build/outputs/apk/debug"
          if [ -d "$OUT" ]; then
            for apk in "$OUT"/*.apk; do
              base=$(basename "$apk")
              if echo "$base" | grep -q "arm64-v8a"; then
                cp "$apk" "artifacts/Stalkerhek-TV-Phone-arm64-v8a.apk"
              elif echo "$base" | grep -q "x86_64"; then
                cp "$apk" "artifacts/Stalkerhek-x86_64.apk"
              elif echo "$base" | grep -q "universal"; then
                cp "$apk" "artifacts/Stalkerhek-universal.apk"
              elif echo "$base" | grep -qv "split-"; then
                cp "$apk" "artifacts/Stalkerhek-universal.apk"
              fi
            done
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Stalkerhek-APKs
          path: artifacts/
          compression-level: 0

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          name: Stalkerhek ${{ github.ref_name }}
          body: |
            ## Stalkerhek Android App

            ### Downloads
            - **TV / Phone (arm64-v8a)** — For modern Android TV devices and phones
            - **x86_64** — For x86 emulators and devices
            - **Universal** — Contains all architectures

            ### Installation
            Download the APK matching your device and install it.
