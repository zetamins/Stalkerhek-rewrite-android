name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Mark build type
        id: build-info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "variant=release" >> $GITHUB_OUTPUT
            echo "variant_label=Release" >> $GITHUB_OUTPUT
          else
            echo "variant=debug" >> $GITHUB_OUTPUT
            echo "variant_label=Beta (Development Build)" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore
        if: steps.build-info.outputs.variant == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APKs
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [[ "${{ steps.build-info.outputs.variant }}" == "release" ]]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          VARIANT="${{ steps.build-info.outputs.variant }}"
          for OUT in app/build/outputs/apk/release app/build/outputs/apk/debug; do
            if [ -d "$OUT" ]; then
              for apk in "$OUT"/*.apk; do
                [ -f "$apk" ] || continue
                base=$(basename "$apk")
                if echo "$base" | grep -q "arm64-v8a"; then
                  cp "$apk" "artifacts/Stalkerhek-arm64-v8a.apk"
                elif echo "$base" | grep -q "x86_64"; then
                  cp "$apk" "artifacts/Stalkerhek-x86_64.apk"
                elif echo "$base" | grep -q "universal"; then
                  cp "$apk" "artifacts/Stalkerhek-universal.apk"
                elif echo "$base" | grep -qv "split-"; then
                  cp "$apk" "artifacts/Stalkerhek-universal.apk"
                fi
              done
            fi
          done
          ls -lh artifacts/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Stalkerhek-APKs
          path: artifacts/
          compression-level: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          name: Stalkerhek ${{ github.ref_name }}
          body: |
            ## Stalkerhek Android App ${{ github.ref_name }}

            ### Downloads
            - **arm64-v8a** — For modern Android TV devices and phones
            - **x86_64** — For x86 emulators and devices
            - **Universal** — Contains all architectures

            ### Installation
            Download the APK matching your device and install it.

      - name: Create / Update Beta Pre-release
        if: steps.build-info.outputs.variant == 'debug'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete beta --yes 2>/dev/null || true
          gh release create beta artifacts/* \
            --title "Stalkerhek Beta (Development Build)" \
            --notes "Latest development build from the main branch. Not a stable release — use for testing only." \
            --prerelease
